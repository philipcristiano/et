name: Main Branch Deploy

on:
  push:
    branches:
      - main

jobs:

  update_version:
      runs-on: nixos-runner
      steps:

        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Generate version with git-cliff
          id: cliff
          run: |
            nix-env -iA nixpkgs.git-cliff
            git-cliff --config cliff.toml --bumped-version --output CHANGELOG.md
            VERSION=$(git-cliff --config cliff.toml --bumped-version 2>/dev/null)
            echo "version=${VERSION}" >> $GITHUB_OUTPUT

        - name: Update VERSION file
          run: echo "${{ steps.cliff.outputs.version }}" | sed 's/^v//' > VERSION

        - name: Create PR branch and push
          run: |
            VERSION=${{ steps.cliff.outputs.version }}
            BRANCH="release/${VERSION}"

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git checkout -b $BRANCH
            git add VERSION CHANGELOG.md
            git commit -m "chore: release ${VERSION}"
            git push origin -f $BRANCH

        - name: Open PR via Forgejo API
          run: |
            VERSION=${{ steps.cliff.outputs.version }}
            BRANCH="release/${VERSION}"
            REPO="${{ github.repository }}"

            curl -s -X POST "${{ vars.FORGE_API_URL }}/repos/${REPO}/pulls" \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"chore: release ${VERSION}\",
                \"head\": \"${BRANCH}\",
                \"base\": \"main\",
                \"body\": \"Automated release PR for ${VERSION}\"
              }"

  flake:
    runs-on: nixos-runner
    steps:
      - uses: actions/checkout@v6
      - name: Build
        env:
          SQLX_OFFLINE: true
        run: nix --experimental-features 'nix-command flakes' build

      - name: Build Docker
        env:
          SQLX_OFFLINE: true
        run: nix --experimental-features 'nix-command flakes' build '#docker'

      - name: Log in to Docker Hub
        run: |
          nix-env -iA nixpkgs.docker
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag and push Docker
        run: |
          nix-env -iA nixpkgs.gawk
          IMAGE=$(docker load < result | awk '/Loaded image:/ {print $3}')
          NAME=$(echo $IMAGE | cut -d: -f1)
          VERSION=$(echo $IMAGE | cut -d: -f2)
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          docker tag $IMAGE ${{ vars.DOCKER_ORG }}/$NAME:$VERSION-$SHORT_SHA
          docker push ${{ vars.DOCKER_ORG }}/$NAME:$VERSION-$SHORT_SHA
